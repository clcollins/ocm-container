http_listen_addr: :6060
introspection_addr: :6061
log_level: info
indexer:
  connstring: host=localhost port=5432 dbname=clair user=clair password=clair sslmode=disable
  scanlock_retry: 10
  layer_scan_concurrency: 5
  migrations: true
matcher:
  connstring: host=localhost port=5432 dbname=clair user=clair password=clair sslmode=disable
  max_conn_pool: 100
  migrations: true
  indexer_addr: http://localhost:6060
  period: 24h  # Reduce update frequency (default: 6h)
notifier:
  connstring: host=localhost port=5432 dbname=clair user=clair password=clair sslmode=disable
  migrations: true
  indexer_addr: http://localhost:6060
  matcher_addr: http://localhost:6060
